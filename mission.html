    // ── localStorage shim for window.storage API ──────────────────────────────
    window.storage = {
      get: function(key) {
        try {
          var val = localStorage.getItem(key);
          return Promise.resolve(val !== null ? { key: key, value: val } : null);
        } catch(e) {
          return Promise.reject(e);
        }
      },
      set: function(key, value) {
        try {
          localStorage.setItem(key, value);
          return Promise.resolve({ key: key, value: value });
        } catch(e) {
          return Promise.reject(e);
        }
      },
      delete: function(key) {
        try {
          localStorage.removeItem(key);
          return Promise.resolve({ key: key, deleted: true });
        } catch(e) {
          return Promise.reject(e);
        }
      }
    };
  </script>

  const [loaded, setLoaded] = useState(false);

  useEffect(() => {

      try {

        const [w,d,wk,ev,st] = await Promise.all(keys.map(k => window.storage.get(k).catch(()=>null)));
        if (w) setWeek(JSON.parse(w.value));
        if (d) setDaily(JSON.parse(d.value));
        if (wk) setWkly(JSON.parse(wk.value));
        if (ev) setEvidence(JSON.parse(ev.value));
        if (st) setOssStage(JSON.parse(st.value));
      } catch {}
      setLoaded(true);
    })();
  }, []);

  const save = (k,v) => window.storage.set(k, JSON.stringify(v)).catch(()=>{});
  const setWeekNum = n => { const v=Math.max(1,Math.min(36,n)); setWeek(v); save("pepp-week",v); };
  const toggleDaily = i => { const n=daily.map((x,j)=>j===i?!x:x); setDaily(n); save("pepp-daily",n); };
  const toggleWkly  = i => { const n=wkly.map((x,j)=>j===i?!x:x); setWkly(n); save("pepp-wkly",n); };
  const setStage = n => { setOssStage(n); save("pepp-oss-stage",n); };
  const updateEvidence = (key, delta) => {
    const next = {...evidence, [key]: Math.max(0,(evidence[key]||0)+delta)};
    setEvidence(next); save("pepp-evidence",next);
  };

  const cw = PEPP_WEEKS[week-1];
  const phase = week<=12 ? 1 : week<=24 ? 2 : 3;

function PasswordGate({ onUnlock }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState(false);
  const [show, setShow] = useState(false);
  const check = () => {
    if (val.trim().toLowerCase() === PASS.toLowerCase()) { onUnlock(); }
    else { setErr(true); setTimeout(() => setErr(false), 1500); setVal(""); }
  };
  return (
    <div style={{ minHeight:"100vh", background:"#060a0f", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'JetBrains Mono','Fira Code',monospace" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');*{box-sizing:border-box;margin:0;padding:0}input{outline:none}`}</style>
      <div style={{ textAlign:"center", padding:"40px 24px", maxWidth:380 }}>
        <div style={{ fontFamily:"'Space Grotesk',sans-serif", fontSize:13, color:"#22c55e", letterSpacing:"0.3em", marginBottom:8 }}>DAY ZERO // MISSION CONTROL</div>
        <div style={{ fontFamily:"'Space Grotesk',sans-serif", fontSize:26, fontWeight:700, color:"#f8fafc", marginBottom:6, letterSpacing:"-0.02em" }}>@donaldraph</div>
        <div style={{ fontSize:11, color:"#374151", marginBottom:36, letterSpacing:"0.1em" }}>RESTRICTED ACCESS</div>
        <div style={{ position:"relative", marginBottom:12 }}>
          <input
            type={show ? "text" : "password"}
            value={val}
            onChange={e => setVal(e.target.value)}
            onKeyDown={e => e.key === "Enter" && check()}
            placeholder="enter password"
            style={{ width:"100%", background:"#0d1117", border:`1px solid ${err ? "#ef4444" : "#1e2a3a"}`, color:"#e2e8f0", padding:"12px 44px 12px 16px", borderRadius:8, fontSize:14, fontFamily:"inherit", transition:"border-color 0.2s" }}
          />
          <button onClick={() => setShow(s => !s)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#374151", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
            {show ? "hide" : "show"}
          </button>
        </div>
        {err && <div style={{ color:"#ef4444", fontSize:11, marginBottom:8, letterSpacing:"0.05em" }}>incorrect password</div>}
        <button onClick={check} style={{ width:"100%", background:"rgba(34,197,94,0.12)", border:"1px solid rgba(34,197,94,0.4)", color:"#22c55e", padding:"12px", borderRadius:8, fontSize:13, fontFamily:"inherit", fontWeight:600, cursor:"pointer", letterSpacing:"0.1em" }}>
          UNLOCK
        </button>
        <div style={{ marginTop:20, fontSize:10, color:"#1e2a3a", letterSpacing:"0.1em" }}>change PASS const in source to update</div>
      </div>
    </div>
  );
}

function MissionControl() {
  const [items, setItems] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [cat, setCat] = useState("All");
  const [statusF, setStatusF] = useState("All");
  const [search, setSearch] = useState("");
  const [showDone, setShowDone] = useState(false);
  const [adding, setAdding] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ text:"", status:"PLANNING", category:"Career" });
  const inputRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("mc-items-v3");
        setItems(r ? JSON.parse(r.value) : SEED);
      } catch { setItems(SEED); }
      setLoaded(true);
    })();
  }, []);
  useEffect(() => {
    if (loaded) window.storage.set("mc-items-v3", JSON.stringify(items)).catch(() => {});
  }, [items, loaded]);
  useEffect(() => { if (adding && inputRef.current) inputRef.current.focus(); }, [adding]);

  const save = () => {
    if (!form.text.trim()) return;
    if (editId) {
      setItems(p => p.map(i => i.id === editId ? { ...i, ...form } : i));
      setEditId(null);
    } else {
      setItems(p => [...p, { ...form, id: gid(), pinned: false }]);
    }
    setForm({ text:"", status:"PLANNING", category:"Career" });
    setAdding(false);
  };
  const startEdit = item => { setForm({ text:item.text, status:item.status, category:item.category }); setEditId(item.id); setAdding(true); };
  const togglePin = id => setItems(p => p.map(i => i.id === id ? { ...i, pinned: !i.pinned } : i));
  const cycleStatus = id => {
    setItems(p => p.map(i => {
      if (i.id !== id) return i;
      const idx = STATUS_ORDER.indexOf(i.status);
      return { ...i, status: STATUS_ORDER[(idx + 1) % STATUS_ORDER.length] };
    }));
  };
  const remove = id => setItems(p => p.filter(i => i.id !== id));
  const cancel = () => { setAdding(false); setEditId(null); setForm({ text:"", status:"PLANNING", category:"Career" }); };

  const visible = items.filter(i => {
    if (!showDone && i.status === "DONE") return false;
    if (cat !== "All" && i.category !== cat) return false;
    if (statusF !== "All" && i.status !== statusF) return false;
    if (search && !i.text.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  const grouped = {};
  STATUS_ORDER.forEach(s => { grouped[s] = []; });
  visible.forEach(i => { if (grouped[i.status]) grouped[i.status].push(i); });
  Object.keys(grouped).forEach(s => grouped[s].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0)));
  const counts = {};
  STATUS_ORDER.forEach(s => { counts[s] = items.filter(i => i.status === s).length; });

  return (
    <div>
      {/* Stats */}
      <div style={{ display:"flex", gap:8, marginBottom:16, overflowX:"auto", paddingBottom:4 }}>
        {STATUS_ORDER.map(k => (
          <div key={k} onClick={() => setStatusF(statusF === k ? "All" : k)}
            style={{ background: statusF===k ? S[k].bg : "rgba(255,255,255,0.02)", border:`1px solid ${statusF===k ? S[k].color+"50" : "#1a2332"}`, borderRadius:8, padding:"8px 12px", cursor:"pointer", minWidth:"fit-content", transition:"all 0.15s" }}>
            <div style={{ fontSize:18, fontWeight:700, color:S[k].color, lineHeight:1 }}>{counts[k]||0}</div>
            <div style={{ fontSize:9, color:"#64748b", marginTop:2, letterSpacing:"0.1em" }}>{S[k].label.toUpperCase()}</div>
          </div>
        ))}
      </div>
      {/* Filters */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center", marginBottom:16 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="search..."
          style={{ background:"#111827", border:"1px solid #1e2a3a", color:"#e2e8f0", padding:"6px 12px", borderRadius:6, fontSize:12, fontFamily:"inherit", width:150 }} />
        <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
          {CATS.map(c => (
            <button key={c} onClick={() => setCat(c)}
              style={{ background: cat===c ? "#1e3a5f" : "rgba(255,255,255,0.02)", border:`1px solid ${cat===c ? "#38bdf8" : "#1a2332"}`, color: cat===c ? "#38bdf8" : "#64748b", padding:"4px 10px", borderRadius:5, fontSize:10, cursor:"pointer", fontFamily:"inherit", letterSpacing:"0.05em" }}>
              {c}
            </button>
          ))}
        </div>
        <button onClick={() => setShowDone(s => !s)}
          style={{ background: showDone ? "rgba(74,222,128,0.08)" : "rgba(255,255,255,0.02)", border:`1px solid ${showDone?"#4ade80":"#1a2332"}`, color: showDone?"#4ade80":"#475569", padding:"4px 10px", borderRadius:5, fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>
          {showDone?"✓ Done":"Done"}
        </button>
        <button onClick={() => { setAdding(true); setEditId(null); setForm({ text:"", status:"PLANNING", category:"Career" }); }}
          style={{ marginLeft:"auto", background:"rgba(34,197,94,0.1)", border:"1px solid rgba(34,197,94,0.3)", color:"#22c55e", padding:"6px 14px", borderRadius:6, fontSize:12, cursor:"pointer", fontFamily:"inherit", fontWeight:600 }}>
          + Add Item
        </button>
      </div>
      {/* Add/Edit Form */}
      {adding && (
        <div style={{ background:"#111827", border:"1px solid rgba(34,197,94,0.3)", borderRadius:10, padding:16, marginBottom:16 }}>
          <div style={{ fontSize:10, color:"#22c55e", marginBottom:10, letterSpacing:"0.15em" }}>{editId ? "EDIT ITEM" : "NEW ITEM"}</div>
          <textarea ref={inputRef} value={form.text} onChange={e => setForm(f => ({ ...f, text:e.target.value }))}
            onKeyDown={e => { if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();save();} if(e.key==="Escape")cancel(); }}
            placeholder="What are you doing, building, learning, applying for, planning..." rows={2}
            style={{ width:"100%", background:"#0b0e14", border:"1px solid #1e2a3a", color:"#e2e8f0", padding:"10px 12px", borderRadius:6, fontSize:13, fontFamily:"inherit", resize:"vertical", marginBottom:10 }} />
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <select value={form.status} onChange={e => setForm(f => ({ ...f, status:e.target.value }))}
              style={{ background:"#0b0e14", border:"1px solid #1e2a3a", color:S[form.status]?.color||"#e2e8f0", padding:"6px 10px", borderRadius:6, fontSize:12, fontFamily:"inherit" }}>
              {STATUS_ORDER.map(k => <option key={k} value={k}>{S[k].label}</option>)}
            </select>
            <select value={form.category} onChange={e => setForm(f => ({ ...f, category:e.target.value }))}
              style={{ background:"#0b0e14", border:"1px solid #1e2a3a", color:"#94a3b8", padding:"6px 10px", borderRadius:6, fontSize:12, fontFamily:"inherit" }}>
              {CATS.filter(c => c!=="All").map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <button onClick={save} style={{ background:"rgba(34,197,94,0.15)", border:"1px solid #22c55e", color:"#22c55e", padding:"6px 16px", borderRadius:6, fontSize:12, cursor:"pointer", fontFamily:"inherit", fontWeight:600 }}>
              {editId ? "Update" : "Add"}
            </button>
            <button onClick={cancel} style={{ background:"transparent", border:"1px solid #1e2a3a", color:"#64748b", padding:"6px 14px", borderRadius:6, fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
            <span style={{ fontSize:10, color:"#374151", marginLeft:"auto" }}>Enter = save · Esc = cancel</span>
          </div>
        </div>
      )}
      {/* Grouped Items */}
      {STATUS_ORDER.map(sk => {
        if (!showDone && sk === "DONE") return null;
        const grp = grouped[sk];
        if (!grp.length) return null;
        return (
          <div key={sk} style={{ marginBottom:28 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
              <div style={{ width:7, height:7, borderRadius:"50%", background:S[sk].color, flexShrink:0, ...(sk==="DOING"?{animation:"pulse 2s infinite"}:{}) }} />
              <span style={{ fontSize:10, letterSpacing:"0.2em", color:S[sk].color, fontWeight:600 }}>{S[sk].label.toUpperCase()}</span>
              <span style={{ fontSize:10, color:"#374151" }}>— {grp.length}</span>
              <div style={{ flex:1, height:1, background:S[sk].color+"18" }} />
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              {grp.map(item => (
                <div key={item.id} className="item-row"
                  style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"10px 12px", borderRadius:8, background:item.pinned ? S[sk].bg : "rgba(255,255,255,0.015)", border:`1px solid ${item.pinned ? S[sk].color+"30" : "#0f1724"}` }}>
                  <div style={{ width:3, borderRadius:2, background:S[sk].color, alignSelf:"stretch", flexShrink:0, opacity:0.6 }} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, color:item.status==="DONE"?"#475569":"#cbd5e1", lineHeight:1.55, textDecoration:item.status==="DONE"?"line-through":"none" }}>
                      {item.pinned && <span style={{ color:S[sk].color, fontSize:10, marginRight:6 }}>★</span>}
                      {item.text}
                    </div>
                    <span style={{ display:"inline-block", marginTop:4, fontSize:9, color:"#374151", background:"#0f1724", padding:"1px 6px", borderRadius:3, letterSpacing:"0.08em" }}>{item.category}</span>
                  </div>
                  <div className="actions" style={{ display:"flex", gap:4, opacity:0, flexShrink:0 }}>
                    <button onClick={() => togglePin(item.id)} title="Pin" style={{ background:"none", border:"none", cursor:"pointer", color:item.pinned?S[sk].color:"#374151", fontSize:13, padding:"2px 4px" }}>★</button>
                    <button onClick={() => cycleStatus(item.id)} title="Cycle status" style={{ background:"none", border:"none", cursor:"pointer", color:"#374151", fontSize:11, padding:"2px 4px" }}>⟳</button>
                    <button onClick={() => startEdit(item)} title="Edit" style={{ background:"none", border:"none", cursor:"pointer", color:"#374151", fontSize:11, padding:"2px 4px" }}>✎</button>
                    <button onClick={() => remove(item.id)} title="Remove" style={{ background:"none", border:"none", cursor:"pointer", color:"#374151", fontSize:11, padding:"2px 4px" }}>×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
      {visible.length === 0 && (
        <div style={{ textAlign:"center", padding:"60px 0", color:"#374151", fontSize:13 }}>No items match filters.</div>
      )}
    </div>
  );
}

function SRERoadmap() {
  const [phaseStates, setPhaseStates] = useState({});
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("sre-phase-states");
        if (r) setPhaseStates(JSON.parse(r.value));
      } catch {}
    })();
  }, []);
  const toggleCert = (phaseN, certName) => {
    setPhaseStates(prev => {
      const key = `${phaseN}-${certName}`;
      const next = { ...prev, [key]: !prev[key] };
      window.storage.set("sre-phase-states", JSON.stringify(next)).catch(() => {});
      return next;
    });
  };
  const certsDone = Object.values(phaseStates).filter(Boolean).length;
  const totalCerts = PHASES.reduce((a,p) => a + p.certs.length, 0);
  const phaseColors = ["#22c55e","#38bdf8","#a78bfa","#f59e0b","#fb923c","#e879f9","#ef4444"];

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <div style={{ fontSize:10, color:"#64748b", letterSpacing:"0.15em" }}>SRE CERTIFICATION ROADMAP</div>
          <div style={{ fontSize:13, color:"#94a3b8", marginTop:2 }}>7 phases · {totalCerts} certifications · ${TOTAL_COST.toLocaleString()} total est. cost</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:22, fontWeight:700, color:"#22c55e" }}>{certsDone}/{totalCerts}</div>
          <div style={{ fontSize:9, color:"#64748b", letterSpacing:"0.1em" }}>COMPLETED</div>
        </div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
        {PHASES.map((phase, pi) => {
          const col = phaseColors[pi % phaseColors.length];
          const phaseDone = phase.certs.filter(c => c.done || phaseStates[`${phase.n}-${c.name}`]).length;
          return (
            <div key={phase.n} style={{ background:"rgba(255,255,255,0.02)", border:`1px solid ${col}25`, borderRadius:10, padding:"14px 16px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <div style={{ width:24, height:24, borderRadius:6, background:`${col}20`, border:`1px solid ${col}40`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:col }}>
                    {phase.n}
                  </div>
                  <span style={{ fontSize:13, fontWeight:600, color:"#cbd5e1" }}>{phase.title}</span>
                </div>
                <div style={{ fontSize:11, color:col }}>{phaseDone}/{phase.certs.length}</div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {phase.certs.map(cert => {
                  const isDone = cert.done || phaseStates[`${phase.n}-${cert.name}`];
                  return (
                    <div key={cert.name} onClick={() => !cert.done && toggleCert(phase.n, cert.name)}
                      style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 10px", borderRadius:6, background: isDone ? `${col}12` : "#0b0e14", border:`1px solid ${isDone ? col+"40" : "#1a2332"}`, cursor:cert.done?"default":"pointer" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <div style={{ width:14, height:14, borderRadius:3, border:`1px solid ${isDone ? col : "#374151"}`, background:isDone ? col : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                          {isDone && <span style={{ color:"#0b0e14", fontSize:9, fontWeight:700 }}>✓</span>}
                        </div>
                        <span style={{ fontSize:12, color:isDone?"#64748b":"#94a3b8", textDecoration:isDone?"line-through":"none" }}>{cert.name}</span>
                      </div>
                      <span style={{ fontSize:11, color:"#374151" }}>${cert.cost}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ marginTop:16, padding:"12px 16px", background:"rgba(34,197,94,0.05)", border:"1px solid rgba(34,197,94,0.15)", borderRadius:8, fontSize:11, color:"#64748b", lineHeight:1.7 }}>
        💡 <strong style={{ color:"#94a3b8" }}>Funding paths:</strong> CNCF Community Group (5 free vouchers/yr) · LiFT Scholarship · AWS Community Builder credits · Cloud Club Captain vouchers · KubeCon Dan Kohn Scholarship ($1,500 travel + free registration) · MongoDB/GitHub free vouchers already secured.
      </div>
    </div>
  );
}

function weekCount(id) {
  if (id.includes("-")) {
    const [a,b] = id.split("-").map(Number);
    return b - a + 1;
  }
  return 1;
}

            <div key={book.n} onClick={()=>toggle(book.n)} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 13px",cursor:"pointer",background:readDone[book.n]?"rgba(34,197,94,0.04)":i%2===0?"transparent":"rgba(255,255,255,0.015)",borderBottom:i<READING_LIST.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
              <div style={{width:18,height:18,borderRadius:3,border:`1.5px solid ${readDone[book.n]?"#22c55e":"#334155"}`,background:readDone[book.n]?"#22c55e":"transparent",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {readDone[book.n]&&<span style={{color:"#0b0e14",fontSize:10,fontWeight:700}}>✓</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                  <span style={{fontSize:8,color:TAG_CLR[book.tag]||"#64748b",background:`${TAG_CLR[book.tag]||"#64748b"}18`,border:`1px solid ${TAG_CLR[book.tag]||"#64748b"}30`,padding:"1px 5px",borderRadius:2,fontWeight:600}}>{book.tag}</span>
                  <span style={{fontSize:11,color:readDone[book.n]?"#475569":"#cbd5e1",textDecoration:readDone[book.n]?"line-through":"none"}}>{book.n}. {book.title}</span>
                </div>
                {book.url&&<div style={{fontSize:9,color:"#38bdf8"}}>{book.url}</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

            <div style={{ fontFamily:"'Space Grotesk',sans-serif", fontSize:10, color:"#22c55e", letterSpacing:"0.2em", marginBottom:2 }}>DONALD ANYAMBA // DAY ZERO</div>
            <div className="mc-header-title" style={{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, color:"#f8fafc", letterSpacing:"-0.02em" }}>Mission Control</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:10, color:"#374151" }}>@donaldraph</div>
            <div className="mc-header-sub" style={{ color:"#1e2a3a", marginTop:2 }}>Cloud/SRE · SE Nigeria → World</div>

        {/* Scrollable tab bar */}

          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`tab-btn${tab===t.id?" active":""}`}>

function App() {
  const [unlocked, setUnlocked] = React.useState(false);
  const skipGate = new URLSearchParams(window.location.search).get('skip_gate') === '1';
  if (!unlocked && !skipGate) return <PasswordGate onUnlock={() => setUnlocked(true)} />;
  return <Tracker />;
}

const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(<App />);
  </script>
